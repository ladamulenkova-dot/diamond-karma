<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Алмазный Огранщик — Диагностика кармы</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  
  body {
    font-family: 'Georgia', serif;
    background: #0f0e0b;
    color: #e8dfc8;
    min-height: 100vh;
  }

  .header {
    background: linear-gradient(135deg, #1a1408 0%, #2a1f0a 50%, #1a1408 100%);
    border-bottom: 1px solid #8b6914;
    padding: 32px 24px 24px;
    text-align: center;
  }

  .header h1 {
    font-size: 1.6rem;
    color: #d4a843;
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-bottom: 6px;
  }

  .header p {
    color: #a08a5a;
    font-size: 0.9rem;
    font-style: italic;
  }

  .diamond {
    font-size: 2rem;
    margin-bottom: 8px;
    display: block;
  }

  /* TABS */
  .tabs {
    display: flex;
    background: #1a1408;
    border-bottom: 1px solid #4a3a18;
  }

  .tab {
    flex: 1;
    padding: 12px 8px;
    text-align: center;
    font-size: 0.8rem;
    color: #7a6a45;
    cursor: pointer;
    border-bottom: 2px solid transparent;
    transition: all 0.2s;
    letter-spacing: 0.5px;
  }

  .tab.active {
    color: #d4a843;
    border-bottom-color: #d4a843;
    background: #1f1a0c;
  }

  .tab:hover { color: #c49a35; }

  /* CONTENT */
  .content { display: none; }
  .content.active { display: block; }

  /* ============= ALL 46 PROBLEMS ============= */
  .problems-grid {
    padding: 16px;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .category-label {
    color: #d4a843;
    font-size: 0.75rem;
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-top: 8px;
    margin-bottom: 4px;
    padding-left: 4px;
    border-left: 2px solid #d4a843;
    padding-left: 8px;
  }

  .problem-card {
    background: #1a1408;
    border: 1px solid #3a2d10;
    border-radius: 8px;
    overflow: hidden;
    cursor: pointer;
    transition: border-color 0.2s;
  }

  .problem-card:hover { border-color: #8b6914; }

  .problem-header {
    display: flex;
    align-items: center;
    padding: 12px 14px;
    gap: 10px;
  }

  .problem-num {
    width: 28px;
    height: 28px;
    background: #2a1f0a;
    border: 1px solid #6a5020;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 0.75rem;
    color: #d4a843;
    flex-shrink: 0;
  }

  .problem-title {
    flex: 1;
    font-size: 0.88rem;
    color: #c8b888;
    line-height: 1.4;
  }

  .expand-icon {
    color: #6a5020;
    font-size: 1rem;
    transition: transform 0.2s;
    flex-shrink: 0;
  }

  .problem-card.open .expand-icon { transform: rotate(90deg); }

  .problem-detail {
    display: none;
    padding: 0 14px 14px;
    border-top: 1px solid #2a2008;
    margin-top: 0;
  }

  .problem-card.open .problem-detail { display: block; }

  .problem-full {
    font-size: 0.85rem;
    color: #a09060;
    font-style: italic;
    margin-bottom: 10px;
    margin-top: 10px;
    line-height: 1.5;
  }

  .solution-label {
    font-size: 0.7rem;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: #d4a843;
    margin-bottom: 6px;
  }

  .solution-text {
    font-size: 0.85rem;
    color: #c8b888;
    line-height: 1.6;
    background: #0f0e0b;
    border-left: 2px solid #8b6914;
    padding: 10px 12px;
    border-radius: 0 4px 4px 0;
  }

  /* ============= DIAGNOSIS ============= */
  .diagnosis-intro {
    padding: 20px 16px 8px;
    color: #a09060;
    font-size: 0.9rem;
    line-height: 1.6;
    font-style: italic;
    text-align: center;
  }

  .progress-bar {
    height: 3px;
    background: #2a2008;
    border-radius: 2px;
    margin: 8px 16px 0;
  }

  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, #8b6914, #d4a843);
    border-radius: 2px;
    transition: width 0.4s ease;
  }

  .progress-text {
    text-align: center;
    font-size: 0.75rem;
    color: #6a5020;
    padding: 6px 16px 12px;
  }

  .question-block {
    padding: 16px;
    display: none;
  }

  .question-block.active { display: block; }

  .question-category {
    font-size: 0.7rem;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: #8b6914;
    margin-bottom: 8px;
  }

  .question-text {
    font-size: 0.95rem;
    color: #e8dfc8;
    line-height: 1.5;
    margin-bottom: 16px;
    font-weight: bold;
  }

  .answer-options {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .answer-btn {
    background: #1a1408;
    border: 1px solid #3a2d10;
    border-radius: 8px;
    padding: 12px 14px;
    color: #c8b888;
    font-size: 0.85rem;
    cursor: pointer;
    text-align: left;
    transition: all 0.2s;
    font-family: 'Georgia', serif;
    line-height: 1.4;
  }

  .answer-btn:hover {
    border-color: #d4a843;
    background: #1f1a0c;
    color: #e8dfc8;
  }

  .answer-btn.selected {
    border-color: #d4a843;
    background: #2a1f0a;
    color: #d4a843;
  }

  .nav-buttons {
    display: flex;
    gap: 10px;
    padding: 0 16px 20px;
    margin-top: 8px;
  }

  .btn-prev, .btn-next {
    padding: 10px 20px;
    border-radius: 6px;
    font-size: 0.85rem;
    cursor: pointer;
    font-family: 'Georgia', serif;
    transition: all 0.2s;
    border: none;
  }

  .btn-prev {
    background: #1a1408;
    border: 1px solid #3a2d10;
    color: #7a6a45;
    flex: 1;
  }

  .btn-next {
    background: linear-gradient(135deg, #8b6914, #c49a35);
    color: #0f0e0b;
    flex: 2;
    font-weight: bold;
  }

  .btn-next:disabled {
    opacity: 0.4;
    cursor: not-allowed;
  }

  .btn-next:not(:disabled):hover {
    background: linear-gradient(135deg, #c49a35, #d4a843);
  }

  /* ============= RESULTS ============= */
  .results-content {
    padding: 16px;
  }

  .results-title {
    text-align: center;
    color: #d4a843;
    font-size: 1.1rem;
    margin-bottom: 4px;
  }

  .results-subtitle {
    text-align: center;
    color: #7a6a45;
    font-size: 0.8rem;
    font-style: italic;
    margin-bottom: 20px;
  }

  .karma-score {
    text-align: center;
    margin: 16px 0 24px;
  }

  .score-circle {
    width: 80px;
    height: 80px;
    border-radius: 50%;
    background: linear-gradient(135deg, #2a1f0a, #1a1408);
    border: 3px solid #d4a843;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    margin: 0 auto 8px;
  }

  .score-num {
    font-size: 1.8rem;
    color: #d4a843;
    line-height: 1;
  }

  .score-label {
    font-size: 0.6rem;
    color: #8b6914;
    text-transform: uppercase;
    letter-spacing: 1px;
  }

  .score-desc {
    color: #a09060;
    font-size: 0.85rem;
    font-style: italic;
  }

  .section-title {
    font-size: 0.75rem;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: #d4a843;
    margin: 20px 0 10px;
    border-bottom: 1px solid #3a2d10;
    padding-bottom: 6px;
  }

  .found-problem {
    background: #1a1408;
    border: 1px solid #3a2d10;
    border-left: 3px solid #c0392b;
    border-radius: 0 8px 8px 0;
    padding: 12px 14px;
    margin-bottom: 8px;
  }

  .fp-num {
    font-size: 0.7rem;
    color: #8b6914;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-bottom: 4px;
  }

  .fp-title {
    font-size: 0.88rem;
    color: #e8dfc8;
    margin-bottom: 8px;
    line-height: 1.4;
  }

  .fp-solution-label {
    font-size: 0.7rem;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    color: #d4a843;
    margin-bottom: 4px;
  }

  .fp-solution {
    font-size: 0.83rem;
    color: #c8b888;
    line-height: 1.5;
  }

  .plan-item {
    background: #1a1408;
    border: 1px solid #3a2d10;
    border-radius: 8px;
    padding: 14px;
    margin-bottom: 10px;
    display: flex;
    gap: 12px;
    align-items: flex-start;
  }

  .plan-week {
    width: 40px;
    height: 40px;
    background: linear-gradient(135deg, #2a1f0a, #3a2d10);
    border: 1px solid #8b6914;
    border-radius: 6px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }

  .plan-week-num {
    font-size: 1rem;
    color: #d4a843;
    line-height: 1;
  }

  .plan-week-label {
    font-size: 0.55rem;
    color: #8b6914;
    text-transform: uppercase;
  }

  .plan-body {}

  .plan-action {
    font-size: 0.88rem;
    color: #e8dfc8;
    margin-bottom: 4px;
    font-weight: bold;
  }

  .plan-desc {
    font-size: 0.82rem;
    color: #8a7a55;
    line-height: 1.4;
  }

  .restart-btn {
    display: block;
    width: 100%;
    margin-top: 24px;
    padding: 14px;
    background: linear-gradient(135deg, #8b6914, #c49a35);
    border: none;
    border-radius: 8px;
    color: #0f0e0b;
    font-size: 0.9rem;
    font-family: 'Georgia', serif;
    font-weight: bold;
    cursor: pointer;
    letter-spacing: 0.5px;
  }

  .no-problems {
    text-align: center;
    padding: 24px;
    color: #a09060;
    font-style: italic;
  }
</style>
</head>
<body>

<div class="header">
  <span class="diamond">💎</span>
  <h1>Алмазный Огранщик</h1>
  <p>Геше Майкл Роуч · 46 бизнес-проблем и их кармические решения</p>
</div>

<div class="tabs">
  <div class="tab active" onclick="switchTab('problems')">46 Проблем</div>
  <div class="tab" onclick="switchTab('diagnosis')">Диагностика</div>
  <div class="tab" onclick="switchTab('results')">Мой план</div>
</div>

<div id="tab-problems" class="content active">
  <div class="problems-grid" id="problemsGrid"></div>
</div>

<div id="tab-diagnosis" class="content">
  <div class="diagnosis-intro">
    Ответьте честно на вопросы — и получите персональный план создания правильной кармы
  </div>
  <div class="progress-bar">
    <div class="progress-fill" id="progressFill" style="width:0%"></div>
  </div>
  <div class="progress-text" id="progressText">Вопрос 0 из 20</div>
  <div id="questionsContainer"></div>
  <div class="nav-buttons">
    <button class="btn-prev" id="btnPrev" onclick="prevQuestion()">← Назад</button>
    <button class="btn-next" id="btnNext" onclick="nextQuestion()" disabled>Далее →</button>
  </div>
</div>

<div id="tab-results" class="content">
  <div class="results-content" id="resultsContent">
    <p style="text-align:center;color:#7a6a45;font-style:italic;padding:30px 16px;">
      Сначала пройдите диагностику, чтобы увидеть ваш персональный план
    </p>
  </div>
</div>

<script>
const PROBLEMS = [
  { n:1, title:"Нестабильные доходы", full:"Финансы нестабильны, доходы всё время скачут.", solution:"Охотнее делитесь доходами с теми, кто помог их заработать. Строго следите, чтобы не зарабатывать нечестным путём. Важна не сумма, а постоянная готовность делиться.", category:"Деньги и финансы" },
  { n:2, title:"Вложения не окупаются", full:"Капитальные вложения не окупаются: оборудование, компьютеры, транспорт быстро устаревают.", solution:"Перестаньте завидовать другим предпринимателям и чужому бизнесу. Сконцентрируйтесь на том, чтобы сделать собственную компанию новаторской и творческой. Не огорчайтесь из-за чужих успехов.", category:"Деньги и финансы" },
  { n:3, title:"Потеря авторитета", full:"Ваше положение в компании нестабильно; кажется, что вы теряете авторитет.", solution:"Самым внимательным образом следите, чтобы не проявлять высокомерие. Будьте с подчинёнными на равных, не отрывайтесь от коллектива, прислушивайтесь к тем, с кем работаете.", category:"Положение и статус" },
  { n:4, title:"Не можете наслаждаться заработанным", full:"Не в состоянии получать удовольствие ни от денег, ни от вещей, которые достаются с таким трудом.", solution:"Не завидуйте результатам усилий других; перестаньте сравнивать себя с другими, просто наслаждайтесь тем, что имеете. Будьте хозяином самому себе и цените то, что есть у вас.", category:"Деньги и финансы" },
  { n:5, title:"Хроническая неудовлетворённость", full:"Независимо от того, как развивается бизнес, вас преследует чувство неудовлетворённости, что этого недостаточно.", solution:"Перестаньте сравнивать себя с другими. Цените то, что имеете. Не завидуйте результатам усилий других.", category:"Деньги и финансы" },
  { n:6, title:"Конфликты руководства и персонала", full:"Кажется, что руководство и персонал всё время борются друг с другом.", solution:"Никогда не вступайте в разговоры, направленные на раскол среди людей — явно или скрыто. Неважно, правда это или ложь: если намерение — сделать двух людей дальше друг от друга, это создаёт негативный отпечаток.", category:"Команда и отношения" },
  { n:7, title:"Вечные конфликты с партнёрами", full:"Постоянно возникают проблемы с бизнес-партнёрами; ссоры снова и снова, независимо от того, как часто их меняете.", solution:"Никогда не вступайте в разговоры, направленные на раскол среди людей. Не сеейте рознь между людьми ни словом, ни намёком.", category:"Команда и отношения" },
  { n:8, title:"Нерешительность в бизнесе", full:"Склонность пересматривать свои собственные решения; развивается нерешительность в вопросах бизнеса.", solution:"Два источника: недостаток заботы о других членах руководства и подчинённых; а также стремление выдавать себя за того, кем в действительности вы не являетесь. Оставайтесь собой — тогда ум и решения будут ясными и волевыми.", category:"Управление собой" },
  { n:9, title:"Нехватка средств для роста", full:"Хотите расширить бизнес, ситуация выгодная, но нет наличности.", solution:"Перестаньте быть скрягой как в бизнесе, так и в личной жизни. Отдавайте, отдавайте, отдавайте другим. Убедитесь, что ваши сделки выигрышны для обеих сторон. Поддерживайте щедрое состояние ума.", category:"Деньги и финансы" },
  { n:10, title:"Форс-мажоры и аварии", full:"Бизнесу наносят ущерб непредсказуемые аварии, плохая погода, перебои в инфраструктуре.", solution:"Очень серьёзно относитесь к выполнению своих обещаний, особенно принятых обязательств придерживаться особых принципов в деловых отношениях и личной жизни.", category:"Внешняя среда" },
  { n:11, title:"Нет концентрации в сложных ситуациях", full:"Не способны сконцентрироваться или удерживать ум в сосредоточении при осложнениях в бизнесе.", solution:"Ежедневно уделяйте время для спокойных, сосредоточенных размышлений о смысле жизни. Правильно ли расставлены жизненные приоритеты? Остановите бег, оглянитесь на свою жизнь.", category:"Управление собой" },
  { n:12, title:"Не понимаете бизнес-концепции", full:"Не в состоянии понять основные концепции бизнеса, схемы рыночных структур, системы.", solution:"Исследуйте своё понимание глобальных основ устройства мироздания. Нельзя игнорировать вопрос, почему мир работает так, а не иначе, и при этом ожидать понимания бизнеса.", category:"Управление собой" },
  { n:13, title:"Не можете найти подходящее помещение", full:"Арендная плата слишком высока! Никак не найти здание для нового филиала.", solution:"Обязательно помогайте найти пристанище тем, кто в нём нуждается. Небольшой отпечаток укореняется в подсознании и потом возвращается к вам в нужный момент.", category:"Ресурсы и пространство" },
  { n:14, title:"Достойные партнёры избегают вас", full:"Те компании и лица, которых вы считаете особенно достойными, не торопятся с вами работать.", solution:"Перестаньте закрывать глаза на нравственные недостатки партнёров ради денег или выгоды. Выбирайте партнёров прежде всего по их порядочности и моральному облику.", category:"Команда и отношения" },
  { n:15, title:"Конкуренты всегда опережают", full:"Безжалостная конкуренция: только кажется, что идёте ноздря в ноздрю, как соперники снова одерживают верх.", solution:"Главная причина — грубость в разговоре с окружающими. Избегайте унижать людей как явно, так и завуалированно. Отпечаток от грубых слов возвращает вас в проигрышную позицию.", category:"Внешняя среда" },
  { n:16, title:"Люди наносят удар в спину", full:"Снова и снова, когда сближаетесь с кем-то, тот вдруг разворачивается и наносит удар в спину.", solution:"Перестаньте испытывать злорадство при виде чужих неудач. Никогда не радуйтесь чужим проблемам. Это одна из главных причин предательства в ответ.", category:"Команда и отношения" },
  { n:17, title:"Тщательно спланированные проекты проваливаются", full:"Продумываете важный проект до мельчайших деталей, напряжённо работаете, а он берёт и проваливается.", solution:"Причина — непонимание того, как действительно работают вещи. Изучайте законы кармы и причинно-следственных связей. Упорный труд сам по себе недостаточен без правильных отпечатков.", category:"Проекты и стратегия" },
  { n:18, title:"Никто не помогает в трудный момент", full:"Люди вокруг и пальцем не пошевелят, чтобы выручить вас, когда больше всего нужна помощь.", solution:"Перестаньте испытывать нездоровое удовольствие при виде чужих проблем. В идеале — не упускайте ни одного случая помочь, пусть даже в мелочах.", category:"Команда и отношения" },
  { n:19, title:"Постоянная раздражительность", full:"Не способны управлять своей злобой; раздражают сотрудники, поставщики, заказчики и вообще всё.", solution:"Перестаньте желать другим несчастья или не сочувствовать тем, у кого неприятности. Беды в вашем бизнесе — ваш общий враг. Искренне желайте другим добра.", category:"Управление собой" },
  { n:20, title:"Хаос на рынке и в бизнесе", full:"Климат на рынке хаотичен; показатели прыгают вверх-вниз без смысла и логики.", solution:"Виной хаосу — хаотическое намерение, пожелание неудачи другим. Достигните состояния, когда не желаете вреда никому, — и рынок станет стабильным.", category:"Внешняя среда" },
  { n:21, title:"Коррупция проникает везде", full:"Коррупция проникает во все сферы бизнеса: в госрегулирование, взаимодействие с компаниями, поведение сотрудников.", solution:"Сознательно радуйтесь успехам каждого вокруг — маленьким и большим, своей фирмы и конкурентов. Восхищайтесь хорошо выполненной работой. Перестаньте поддаваться зависти при виде чужого счастья.", category:"Внешняя среда" },
  { n:22, title:"Нарастающие проблемы со здоровьем", full:"По мере карьеры обнаруживаются небольшие проблемы со здоровьем, которые становятся всё серьёзнее.", solution:"Выявите любые нарушения, негативно влияющие на здоровье сотрудников. Следите за эргономикой рабочих мест, соблюдайте все требования безопасности — не для инспекторов, а на самом деле.", category:"Здоровье и среда" },

  { n:24, title:"Необъяснимая подавленность и депрессия", full:"Всё чаще чувствуете недовольство даже если бизнес в порядке. Лёгкие приступы депрессии или неуверенности.", solution:"Проанализируйте, не подначиваете ли вы сотрудников поступать нечестно. Нет ли в вашем стиле руководства скрытого одобрения любого нечестного поведения. Требуйте честности от всех.", category:"Управление собой" },
  { n:25, title:"Вам не верят даже когда говорите правду", full:"Окружающие — коллеги, клиенты, поставщики — не верят ни единому вашему слову, даже если говорите правду.", solution:"Причина — в прошлой лжи, оставившей отпечатки в вашем уме. Прекратите любую ложь, даже в мелочах. Со временем отпечаток растворится и люди начнут вам верить.", category:"Команда и отношения" },
  { n:26, title:"Все совместные проекты проваливаются", full:"Какое бы совместное усилие — проект, партнёрство, слияние — вы ни предпринимали, всё безуспешно.", solution:"Будьте предельно внимательны к тому, чтобы самому быть абсолютно честным. Давайте людям точное впечатление о том, как вы сами видите вещи. Честность в описании — ключ к успешным партнёрствам.", category:"Проекты и стратегия" },
  { n:27, title:"Вокруг все обманывают друг друга", full:"Работаете в отрасли, где люди часто обманывают друг друга.", solution:"Избежать такого видения можно только если вы сами сохраняете полную честность во всех коммерческих начинаниях. Тогда мало-помалу вокруг вас будет меньше нечестных людей.", category:"Внешняя среда" },
  { n:28, title:"Начальник разговаривает оскорбительно", full:"Ваш босс часто разговаривает с вами в оскорбительной манере.", solution:"Будьте очень осторожны в управлении гневом. Рассердившись на босса, вы создаёте отпечаток, который заставит вас снова столкнуться с грубостью. Прекратите огонь в одностороннем порядке.", category:"Команда и отношения" },
  { n:29, title:"Карьера портит внешность", full:"Годы в мире бизнеса не пошли на пользу вашей внешности.", solution:"Заботьтесь о физическом состоянии всех вокруг — сотрудников и коллег. Помогайте другим заботиться о своём здоровье, и отпечаток вернётся к вам.", category:"Здоровье и среда" },
  { n:30, title:"Постоянная критика независимо от работы", full:"Независимо от того, как справляетесь со своей работой, окружающие всё время вас критикуют.", solution:"Прежде чем что-то сказать или сделать, внимательно обдумывайте, как это подействует на других. Каждое благое деяние имеет в основе заботу о том, чтобы другие гордились тем, что видят в вас.", category:"Команда и отношения" },
  { n:31, title:"Подчинённые не доводят дела до конца", full:"Ваши подчинённые никогда не доводят до конца проекты, которые вы им поручаете.", solution:"Проявите особую заботу о том, чтобы облегчить работу сотрудникам. Активно помогайте другим подразделениям, даже за счёт собственных ресурсов. Будьте первым, кто помогает.", category:"Команда и отношения" },
  { n:32, title:"Проекты начинаются хорошо, потом тормозят", full:"Бизнес-проекты сначала идут как по маслу, а потом начинают тормозить.", solution:"Практикуйте медитацию благодарности. Вспоминайте всё хорошее в своей жизни и людей, которые помогли вам это обрести. Благодарность создаёт отпечатки устойчивого успеха.", category:"Проекты и стратегия" },

// State
let currentQ = 0;

function switchTab(tab) {
  document.querySelectorAll('.tab').forEach((t,i) => {
    t.classList.toggle('active', ['problems','diagnosis','results'][i] === tab);
  });
  document.querySelectorAll('.content').forEach((c,i) => {
    c.classList.toggle('active', ['tab-problems','tab-diagnosis','tab-results'][i] === `tab-${tab}`);
  });
  if (tab === 'diagnosis' && Object.keys(answers).length === 0) {
    renderQuestion(0);
  }
}

// ========= BUILD PROBLEMS =========
function buildProblems() {
  const cats = {};
  PROBLEMS.forEach(p => {
    if (!cats[p.category]) cats[p.category] = [];
    cats[p.category].push(p);
  });
  
  const grid = document.getElementById('problemsGrid');
  Object.entries(cats).forEach(([cat, probs]) => {
    const label = document.createElement('div');
    label.className = 'category-label';
    label.textContent = cat;
    grid.appendChild(label);
    
    probs.forEach(p => {
      const card = document.createElement('div');
      card.className = 'problem-card';
      card.innerHTML = `
        <div class="problem-header" onclick="toggleProblem(this.parentElement)">
          <div class="problem-num">${p.n}</div>
          <div class="problem-title">${p.title}</div>
          <div class="expand-icon">▶</div>
        </div>
        <div class="problem-detail">
          <div class="problem-full">«${p.full}»</div>
          <div class="solution-label">Кармическое решение</div>
          <div class="solution-text">${p.solution}</div>
        </div>`;
      grid.appendChild(card);
    });
  });
}

function toggleProblem(card) {
  card.classList.toggle('open');
}

// ========= DIAGNOSIS =========
function renderQuestion(idx) {
  currentQ = idx;
  const container = document.getElementById('questionsContainer');
  container.innerHTML = '';
  
  const q = QUESTIONS[idx];
  const block = document.createElement('div');
  block.className = 'question-block active';
  
  block.innerHTML = `
    <div class="question-category">Вопрос ${idx+1} из ${QUESTIONS.length}</div>
    <div class="question-text">${q.text}</div>
    <div class="answer-options">
      ${q.options.map((opt,i) => `
        <button class="answer-btn ${answers[q.id] === i ? 'selected' : ''}" 
                onclick="selectAnswer('${q.id}', ${i}, this)">
          ${opt}
        </button>`).join('')}
    </div>`;
  
  container.appendChild(block);
  updateProgress();
  updateButtons();
}

function selectAnswer(qid, val, btn) {
  answers[qid] = val;
  btn.closest('.answer-options').querySelectorAll('.answer-btn').forEach(b => b.classList.remove('selected'));
  btn.classList.add('selected');
  document.getElementById('btnNext').disabled = false;
}

function updateProgress() {
  const pct = (currentQ / QUESTIONS.length) * 100;
  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('progressText').textContent = `Вопрос ${currentQ+1} из ${QUESTIONS.length}`;
}

function updateButtons() {
  document.getElementById('btnPrev').style.visibility = currentQ === 0 ? 'hidden' : 'visible';
  const q = QUESTIONS[currentQ];
  document.getElementById('btnNext').disabled = answers[q.id] === undefined;
  if (currentQ === QUESTIONS.length - 1) {
    document.getElementById('btnNext').textContent = 'Получить план →';
  } else {
    document.getElementById('btnNext').textContent = 'Далее →';
  }
}

function nextQuestion() {
  if (currentQ < QUESTIONS.length - 1) {
    renderQuestion(currentQ + 1);
  } else {
    buildResults();
    switchTab('results');
  }
}

function prevQuestion() {
  if (currentQ > 0) renderQuestion(currentQ - 1);
}

// ========= RESULTS =========
function buildResults() {
  // Identify problem numbers based on answers
  const problemScores = {};
  
  QUESTIONS.forEach(q => {
    const ans = answers[q.id];
    if (ans === undefined) return;
    
    // score 0=no problem, 1=mild, 2=moderate, 3=severe
    const severity = ans; // 0,1,2,3
    if (severity >= 2) {
      q.map.forEach(pNum => {
        problemScores[pNum] = Math.max(problemScores[pNum] || 0, severity);
      });
    }
  });
  
  // Calculate karma score (100 = perfect)
  const totalAnswers = Object.keys(answers).length;
  const totalSeverity = Object.values(answers).reduce((s,v) => s+v, 0);
  const maxSeverity = totalAnswers * 3;
  const karmaScore = Math.round(100 - (totalSeverity / maxSeverity) * 100);
  
  const criticalProblems = Object.entries(problemScores)
    .filter(([,v]) => v >= 3)
    .map(([k]) => parseInt(k));
  
  const moderateProblems = Object.entries(problemScores)
    .filter(([,v]) => v === 2)
    .map(([k]) => parseInt(k));
  
  const allProblemsFound = [...new Set([...criticalProblems, ...moderateProblems])].sort((a,b)=>a-b);
  
  // Build plan
  const planItems = buildPlan(criticalProblems, moderateProblems);
  
  const scoreDesc = karmaScore >= 80 ? 'Ваша карма в хорошем состоянии. Несколько тонких настроек сделают её совершенной.' :
                    karmaScore >= 60 ? 'Есть значимые области для работы над отпечатками.' :
                    karmaScore >= 40 ? 'Несколько серьёзных кармических блоков требуют внимания.' :
                    'Важно срочно начать работу над отпечатками — сейчас самый подходящий момент.';
  
  const html = `
    <div class="results-title">💎 Ваш кармический портрет</div>
    <div class="results-subtitle">на основе учения Геше Майкла Роуча</div>
    
    <div class="karma-score">
      <div class="score-circle">
        <div class="score-num">${karmaScore}</div>
        <div class="score-label">из 100</div>
      </div>
      <div class="score-desc">${scoreDesc}</div>
    </div>
    
    ${criticalProblems.length > 0 ? `
    <div class="section-title">🔴 Приоритетные зоны (требуют внимания сейчас)</div>
    ${criticalProblems.map(n => {
      const p = PROBLEMS.find(x=>x.n===n);
      return `<div class="found-problem">
        <div class="fp-num">Проблема № ${n}</div>
        <div class="fp-title">${p.title}: ${p.full}</div>
        <div class="fp-solution-label">Кармическое решение</div>
        <div class="fp-solution">${p.solution}</div>
      </div>`;
    }).join('')}` : ''}
    
    ${moderateProblems.length > 0 ? `
    <div class="section-title">🟡 Области для работы</div>
    ${moderateProblems.map(n => {
      const p = PROBLEMS.find(x=>x.n===n);
      return `<div class="found-problem" style="border-left-color:#e6a817">
        <div class="fp-num">Проблема № ${n}</div>
        <div class="fp-title">${p.title}</div>
        <div class="fp-solution-label">Кармическое решение</div>
        <div class="fp-solution">${p.solution}</div>
      </div>`;
    }).join('')}` : ''}
    
    ${allProblemsFound.length === 0 ? `<div class="no-problems">✨ Ваша карма в отличном состоянии! Продолжайте в том же духе.</div>` : ''}
    
    <div class="section-title">📅 Ваш план создания правильной кармы</div>
    ${planItems.map((item,i) => `
      <div class="plan-item">
        <div class="plan-week">
          <div class="plan-week-num">${i+1}</div>
          <div class="plan-week-label">шаг</div>
        </div>
        <div class="plan-body">
          <div class="plan-action">${item.action}</div>
          <div class="plan-desc">${item.desc}</div>
        </div>
      </div>`).join('')}
    
    <button class="restart-btn" onclick="restartDiagnosis()">Пройти диагностику заново</button>
  `;
  
  document.getElementById('resultsContent').innerHTML = html;
}

function buildPlan(critical, moderate) {
  const plan = [];
  
  if (critical.includes(1) || critical.includes(9) || moderate.includes(1)) {
    plan.push({ action:'Начните практику щедрости', desc:'Каждый день делитесь чем-то с теми, кто помог вам зарабатывать — благодарностью, признанием, деньгами. Проверяйте: все ли ваши сделки выгодны для обеих сторон.' });
  }
  
  const hasEnvy = critical.some(n=>[2,4,5,21].includes(n)) || moderate.some(n=>[2,4,5,21].includes(n));
  if (hasEnvy) {
    plan.push({ action:'Практика: радость за других', desc:'Каждый день сознательно находите одного человека, у которого что-то получилось, и искренне порадуйтесь за него. Начните вести дневник — записывайте три чужих успеха в день.' });
  }
  
  const hasGossip = critical.some(n=>[6,7,37,38,39,40,41].includes(n)) || moderate.some(n=>[6,7,37,38,39,40,41].includes(n));
  if (hasGossip) {
    plan.push({ action:'Контроль речи — «фильтр трёх вопросов»', desc:'Перед тем как что-то сказать: Это правда? Это полезно? Это объединяет или разъединяет людей? Перестаньте давать обещания, которые не намерены выполнять.' });
  }
  
  const hasShadenfreude = critical.some(n=>[16,18,19,20].includes(n)) || moderate.some(n=>[16,18,19,20].includes(n));
  if (hasShadenfreude) {
    plan.push({ action:'Остановите злорадство — начните с наблюдения', desc:'В течение одной недели замечайте каждый раз, когда внутри появляется удовольствие от чужой неудачи. Не ругайте себя — просто замечайте и трансформируйте в сочувствие.' });
  }
  
  const hasHonesty = critical.some(n=>[25,26,27,36].includes(n)) || moderate.some(n=>[25,26,27,36].includes(n));
  if (hasHonesty) {
    plan.push({ action:'Практика абсолютной честности', desc:'30 дней: никакой лжи, даже самой маленькой, даже «во благо». Если не можете сказать правду — молчите. Проверьте: не берёте ли вы чужое без разрешения (ресурсы, время, идеи).' });
  }
  
  const hasAnger = critical.includes(28) || critical.includes(19) || moderate.includes(28);
  if (hasAnger) {
    plan.push({ action:'Управление гневом — одностороннее прекращение огня', desc:'Когда вас обижают или раздражают — сделайте паузу. Помните: реакция гневом создаёт отпечаток, который приносит те же ситуации снова. Выйдите из цикла первым.' });
  }
  
  const hasHelp = critical.some(n=>[13,18,31].includes(n)) || moderate.some(n=>[13,18,31].includes(n));
  if (hasHelp) {
    plan.push({ action:'Ежедневная помощь без ожидания отдачи', desc:'Каждый день делайте одно конкретное действие, чтобы облегчить работу другим — подчинённым, коллегам, незнакомым. Небольшие отпечатки накапливаются и возвращаются в нужный момент.' });
  }
  
  const hasReflection = critical.some(n=>[11,12,44].includes(n)) || moderate.some(n=>[11,12,44].includes(n));
  if (hasReflection) {
    plan.push({ action:'Ежедневная медитация и размышление о приоритетах', desc:'10 минут утром в тишине. Вопрос: «Если сегодня последний день — правильным ли делом я занят?» Медитация благодарности: вспомните трёх людей, которые помогли вам достичь того, что есть.' });
  }
  
  // Always add integrity
  plan.push({ action:'Укрепление нравственного стержня', desc:'Определите три нравственных принципа, от которых вы не отступите ни при каком давлении среды. Запишите их. Помните: ваша нравственная целостность — это главный источник кармического успеха по Роучу.' });
  
  if (plan.length < 4) {
    plan.push({ action:'Медитация благодарности (еженедельно)', desc:'Раз в неделю в тихом месте вспоминайте всех, кто помог вам прийти туда, где вы есть. Чувствуйте благодарность к каждому. Этот отпечаток создаёт устойчивость в делах и отношениях.' });
  }
  
  return plan.slice(0, 7);
}

function restartDiagnosis() {
  answers = {};
  currentQ = 0;
  switchTab('diagnosis');
  renderQuestion(0);
}

// Init
buildProblems();
renderQuestion(0);
</script>
